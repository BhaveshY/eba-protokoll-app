appId: de.eb-a.protokoll
productName: EBA Protokoll
copyright: Copyright © 2026 EB&A
icon: icon.png
directories:
  output: release
  buildResources: resources
files:
  - dist/**/*
  - dist-electron/**/*
  - keyterms.json
  - package.json
  - "!**/*.map"
asar: true
asarUnpack: []
extraResources:
  - from: resources/icon.png
    to: icon.png

mac:
  category: public.app-category.productivity
  target:
    - target: zip
      arch: [arm64]
    - target: zip
      arch: [x64]
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  extendInfo:
    NSMicrophoneUsageDescription: EBA Protokoll nimmt das Mikrofon auf, um Meetings zu transkribieren.
    NSCameraUsageDescription: Nicht verwendet.
    NSHighResolutionCapable: true
    LSMinimumSystemVersion: "12.0"

dmg:
  sign: false

win:
  icon: icon.png
  target:
    - target: nsis
      arch: [x64]
  signAndEditExecutable: true

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: always
  createStartMenuShortcut: true
  runAfterFinish: true

linux:
  target:
    - target: AppImage
      arch: [x64]
  category: Office
